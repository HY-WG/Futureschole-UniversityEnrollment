spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/enrollment
    username: app
    password: app
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 5000
      leak-detection-threshold: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
      # 락 대기 타임아웃 3초 — Spring Boot 3 / Jakarta EE 9+ 기준 키
      jakarta.persistence.lock.timeout: 3000

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
